org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
# tflite_flutter mixes Java 1.8 / Kotlin 17 targets in its Android module;
# the mix is harmless for dexing, so downgrade KGP's check to a warning.
kotlin.jvm.target.validation.mode=warning
# The TFLite AARs (tensorflow-lite / -gpu / -api) all declare the namespace
# org.tensorflow.lite, which AGP 9 rejects. Known upstream issue
# (tensorflow/tensorflow#109508); relax the uniqueness check until LiteRT
# ships unique namespaces.
android.uniquePackageNames=false
