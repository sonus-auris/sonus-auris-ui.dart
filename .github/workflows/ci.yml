name: CI (analyze + test)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check out pinned interfaces package
        uses: actions/checkout@v4
        with:
          repository: sonus-auris/sonus-auris-interfaces
          ref: 16cdb9eb843240959c5dc77c3d5592360b4dc7ed
          path: .ci/sonus-auris-interfaces
          persist-credentials: false
      - name: Link sibling interfaces package
        run: ln -s "$GITHUB_WORKSPACE/.ci/sonus-auris-interfaces" "$GITHUB_WORKSPACE/../sonus-auris-interfaces"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.2
      - run: flutter --version
      - run: flutter pub get
      - name: Analyze (fails on warnings/errors, not pre-existing style infos)
        run: flutter analyze --no-fatal-infos
      - name: Unit tests (hard gate)
        run: flutter test
