name: CI (analyze + test)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          flutter-version: 3.44.2
          cache: true
      - run: flutter --version
      - run: flutter pub get
      - name: Analyze (fails on warnings/errors, not pre-existing style infos)
        run: flutter analyze --no-fatal-infos
      - name: Unit tests (hard gate)
        run: flutter test
