name: desktop builds

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: recorder-desktop-${{ github.ref }}
  cancel-in-progress: true

env:
  SONUS_BACKEND_BASE_URL: https://ci.invalid
  SONUS_SUPABASE_URL: https://ci.supabase.co
  SONUS_SUPABASE_ANON_KEY: sb_publishable_ci_compile_only

jobs:
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Install Linux desktop toolchain
        run: >-
          sudo apt-get update && sudo apt-get install -y
          clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.2
          cache: true
      - run: flutter pub get
      - name: Build Linux desktop recorder
        run: >-
          flutter build linux --release -t lib/main_desktop.dart
          "--dart-define=SONUS_BACKEND_BASE_URL=${SONUS_BACKEND_BASE_URL}"
          "--dart-define=SONUS_SUPABASE_URL=${SONUS_SUPABASE_URL}"
          "--dart-define=SONUS_SUPABASE_ANON_KEY=${SONUS_SUPABASE_ANON_KEY}"
      - uses: actions/upload-artifact@v7
        with:
          name: recorder-linux
          path: build/linux/x64/release/bundle
          retention-days: 14

  macos:
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: macos-15
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.2
          cache: true
      - run: flutter pub get
      - name: Build macOS desktop recorder
        run: >-
          flutter build macos --release -t lib/main_desktop.dart
          "--dart-define=SONUS_BACKEND_BASE_URL=${SONUS_BACKEND_BASE_URL}"
          "--dart-define=SONUS_SUPABASE_URL=${SONUS_SUPABASE_URL}"
          "--dart-define=SONUS_SUPABASE_ANON_KEY=${SONUS_SUPABASE_ANON_KEY}"
      - uses: actions/upload-artifact@v7
        with:
          name: recorder-macos-unsigned
          path: build/macos/Build/Products/Release/*.app
          retention-days: 14

  windows:
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.2
          cache: true
      - run: flutter pub get
      - name: Build Windows desktop recorder
        shell: bash
        run: >-
          flutter build windows --release -t lib/main_desktop.dart
          "--dart-define=SONUS_BACKEND_BASE_URL=${SONUS_BACKEND_BASE_URL}"
          "--dart-define=SONUS_SUPABASE_URL=${SONUS_SUPABASE_URL}"
          "--dart-define=SONUS_SUPABASE_ANON_KEY=${SONUS_SUPABASE_ANON_KEY}"
      - uses: actions/upload-artifact@v7
        with:
          name: recorder-windows-unsigned
          path: build/windows/x64/runner/Release
          retention-days: 14
