name: Android emulator account and permission test

# Boots a headless Android emulator and runs the permission smoke-test
# (scripts/emulator/permission-smoke.sh): the login/sign-up screen must render,
# sensitive context permissions must default to opt-in, mic/notifications grant
# cleanly, and the app must not crash.
# GitHub's ubuntu-latest runners expose /dev/kvm, so the emulator is hardware
# accelerated here (the same test also runs on the cluster via
# ci/android-emulator/, for KVM-capable Hetzner/EC2 nodes).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  emulator-permission-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.2

      - run: flutter pub get

      - name: Build debug APK
        run: >-
          flutter build apk --debug
          --dart-define=SONUS_SUPABASE_URL=https://emulator-test.supabase.co
          --dart-define=SONUS_SUPABASE_ANON_KEY=sb_publishable_emulator_test

      - name: Run permission smoke-test on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -no-snapshot -no-audio -no-boot-anim -gpu swiftshader_indirect
          disable-animations: true
          # Single line: the android-emulator-runner feeds `script` to `sh -c`
          # line-by-line, so a trailing-backslash continuation breaks it.
          script: SMOKE_SCREENSHOT="$PWD/permission-smoke.png" bash scripts/emulator/permission-smoke.sh build/app/outputs/flutter-apk/app-debug.apk

      - name: Upload evidence screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: permission-smoke-screenshot
          path: permission-smoke.png
          if-no-files-found: ignore

  # Functional end-to-end: drive the REAL capture pipeline (device mic -> WAV
  # segment on disk) via a Flutter integration_test on the emulator.
  recording-integration-test:
    runs-on: ubuntu-latest
    # Hard cap so a stuck emulator/mic can never hang the job for hours.
    timeout-minutes: 25
    # WIP / non-gating: driving the REAL device mic through the `record` plugin on
    # a HEADLESS emulator is unreliable (the virtual mic can stall past the Dart
    # timeout). Kept for signal; make it gating once we feed the emulator a
    # deterministic virtual audio input (`-audio-input <wav>`). The permission
    # smoke-test + unit suite (including the acoustic/FFT pipeline) are the gate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.2

      - run: flutter pub get

      # Build the integration entrypoint once. The harness pre-installs this
      # exact APK, verifies RECORD_AUDIO, then asks flutter drive to reuse it.
      - name: Build recording integration APK
        run: >-
          flutter build apk --debug
          --target=integration_test/recording_pipeline_test.dart

      - name: Start deterministic virtual audio source
        run: |
          if ! command -v pulseaudio >/dev/null 2>&1 || \
            ! command -v arecord >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y alsa-utils pulseaudio pulseaudio-utils
          fi
          pulseaudio --start --exit-idle-time=-1
          pactl load-module module-null-sink sink_name=sonus_virtual_audio
          pactl set-default-source sonus_virtual_audio.monitor
          pulse_server="$(pactl info | awk -F': ' '/^Server String:/ { print $2; exit }')"
          if [[ "$pulse_server" != unix:* ]]; then
            pulse_server="unix:$pulse_server"
          fi
          PULSE_SERVER="$pulse_server" \
            arecord -D pulse -f S16_LE -r 44100 -c 1 -d 1 -t raw /dev/null
          echo "PULSE_SERVER=$pulse_server" >> "$GITHUB_ENV"
          echo "QEMU_AUDIO_DRV=alsa" >> "$GITHUB_ENV"
          echo "QEMU_ALSA_DAC_DEV=pulse" >> "$GITHUB_ENV"
          echo "QEMU_ALSA_ADC_DEV=pulse" >> "$GITHUB_ENV"
          pactl info

      - name: Run recording integration test on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          # Android Emulator disables host microphone input by default. Explicitly
          # enable it and route ALSA through PulseAudio's null-source monitor,
          # so deterministic silence still traverses the real mic/plugin/WAV
          # pipeline without physical runner audio hardware.
          emulator-options: -no-window -no-snapshot -no-boot-anim -gpu swiftshader_indirect -allow-host-audio
          disable-animations: true
          # The harness pre-installs the test APK and verifies RECORD_AUDIO before
          # launch; a background loop also preserves the grant across reinstalls.
          script: bash scripts/emulator/grant-then-run-integration.sh integration_test/recording_pipeline_test.dart
