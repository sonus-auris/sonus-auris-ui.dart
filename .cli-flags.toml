[help]
url = "https://github.com/sonus-auris/sonus-auris-ui.dart"
columns = ["options", "env", "type", "description"]

[parse]
require_equals = true
stop_at_first_positional = false
unknown_options_env = "FLAGS2ENV_UNKNOWN_OPTIONS"
errors_env = "FLAGS2ENV_PARSE_ERRORS"
allow_unknown = false

[flags.backend_base_url]
env = "SONUS_BACKEND_BASE_URL"
aliases = ["backend-base-url", "api-url"]
type = "string"
help = "Base URL compiled into the Flutter client for JSON API access."

[flags.supabase_url]
env = "SONUS_SUPABASE_URL"
aliases = ["supabase-url"]
type = "string"
help = "Supabase project URL compiled into the Flutter client."

[flags.supabase_anon_key]
env = "SONUS_SUPABASE_ANON_KEY"
aliases = ["supabase-anon-key", "supabase-publishable-key"]
type = "string"
help = "Public Supabase anon/publishable key; never use a service-role key."

[flags.spotify_client_id]
env = "SPOTIFY_CLIENT_ID"
aliases = ["spotify-client-id"]
type = "string"
help = "Public Spotify OAuth client id compiled into the Flutter client."

[flags.soundcloud_client_id]
env = "SOUNDCLOUD_CLIENT_ID"
aliases = ["soundcloud-client-id"]
type = "string"
help = "Public SoundCloud OAuth client id compiled into the Flutter client."
